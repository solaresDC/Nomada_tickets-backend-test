# ==============================================================================
# SUPABASE DATABASE BACKUP - Automatic 30-Day Backup with Retry System
# ==============================================================================
#
# WHAT THIS DOES:
#   - Runs automatically every 30 days
#   - Downloads a complete backup of your Supabase database
#   - Retries up to 3 times if it fails (with increasing wait times)
#   - Logs which attempt number it's on
#   - Creates a GitHub Issue to notify you if ALL retries fail
#   - Saves the backup as a downloadable artifact in GitHub
#
# HOW TO DOWNLOAD YOUR BACKUP:
#   1. Go to your repo on GitHub
#   2. Click "Actions" tab
#   3. Click the latest "Supabase Database Backup" run
#   4. Scroll down to "Artifacts"
#   5. Click the backup file to download it
#
# ==============================================================================

name: Supabase Database Backup

# SCHEDULE: When does this run?
on:
  schedule:
    # Runs at midnight UTC on the 1st of every month
    # (approximately every 30 days)
    # Cron format: minute hour day-of-month month day-of-week
    - cron: '0 0 1 * *'
  
  # Also allows you to run it manually from the GitHub Actions tab
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual backup'
        required: false
        default: 'Manual backup triggered'

# Permissions needed for this workflow
permissions:
  contents: read        # To checkout the repository
  issues: write         # To create an issue if all retries fail
  actions: write        # To upload artifacts

jobs:
  backup:
    name: Backup Supabase Database
    runs-on: ubuntu-latest
    
    # Environment variables available to all steps
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      MAX_RETRIES: 3
      BACKUP_DIR: ./backups

    steps:
      # -------------------------------------------------------
      # STEP 1: Check out the repository
      # -------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------------------------------
      # STEP 2: Install PostgreSQL client (needed for pg_dump)
      # -------------------------------------------------------
      - name: Install PostgreSQL client tools
        run: |
          echo "📦 Installing PostgreSQL client tools..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq gnupg curl
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17
          sudo ln -sf /usr/lib/postgresql/17/bin/pg_dump /usr/local/bin/pg_dump
          echo "✅ PostgreSQL 17 client installed successfully"
          pg_dump --version

      # -------------------------------------------------------
      # STEP 3: Create backup directory
      # -------------------------------------------------------
      - name: Create backup directory
        run: |
          mkdir -p ${{ env.BACKUP_DIR }}
          echo "📁 Backup directory created: ${{ env.BACKUP_DIR }}"

      # -------------------------------------------------------
      # STEP 4: Run backup with retry system
      # -------------------------------------------------------
      - name: Backup database with retry system
        id: backup
        run: |
          #!/bin/bash
          set -euo pipefail

          # Configuration
          MAX_RETRIES=${{ env.MAX_RETRIES }}
          TIMESTAMP=$(date -u +"%Y-%m-%d_%H-%M-%S_UTC")
          BACKUP_FILE="${{ env.BACKUP_DIR }}/nomada_backup_${TIMESTAMP}.sql"
          
          echo "=============================================="
          echo "🗄️  SUPABASE DATABASE BACKUP"
          echo "=============================================="
          echo "📅 Timestamp: ${TIMESTAMP}"
          echo "📂 Backup file: ${BACKUP_FILE}"
          echo "🔄 Max retries: ${MAX_RETRIES}"
          echo "=============================================="

          # Retry loop
          ATTEMPT=0
          BACKUP_SUCCESS=false

          while [ $ATTEMPT -lt $MAX_RETRIES ]; do
            ATTEMPT=$((ATTEMPT + 1))
            
            echo ""
            echo "----------------------------------------------"
            echo "🔄 ATTEMPT ${ATTEMPT} of ${MAX_RETRIES}"
            echo "----------------------------------------------"
            echo "⏰ Started at: $(date -u +"%H:%M:%S UTC")"

            # Try the backup
            if /usr/lib/postgresql/17/bin/pg_dump \
              "${SUPABASE_DB_URL}" \
              --format=plain \
              --no-owner \
              --no-privileges \
              --clean \
              --if-exists \
              --file="${BACKUP_FILE}" \
              2>&1; then
              
              # Check if the file was actually created and has content
              if [ -f "${BACKUP_FILE}" ] && [ -s "${BACKUP_FILE}" ]; then
                FILE_SIZE=$(du -h "${BACKUP_FILE}" | cut -f1)
                LINE_COUNT=$(wc -l < "${BACKUP_FILE}")
                
                echo ""
                echo "✅ BACKUP SUCCESSFUL on attempt ${ATTEMPT} of ${MAX_RETRIES}!"
                echo "📊 File size: ${FILE_SIZE}"
                echo "📝 Line count: ${LINE_COUNT}"
                echo "⏰ Completed at: $(date -u +"%H:%M:%S UTC")"
                
                BACKUP_SUCCESS=true
                break
              else
                echo "⚠️  Attempt ${ATTEMPT} of ${MAX_RETRIES}: Backup file is empty or missing"
              fi
            else
              echo "❌ Attempt ${ATTEMPT} of ${MAX_RETRIES}: pg_dump command failed"
            fi

            # If we haven't exhausted all retries, wait before trying again
            if [ $ATTEMPT -lt $MAX_RETRIES ]; then
              # Increasing wait time: 30s, 60s (exponential-ish backoff)
              WAIT_TIME=$((ATTEMPT * 30))
              echo "⏳ Waiting ${WAIT_TIME} seconds before retry..."
              sleep $WAIT_TIME
            fi
          done

          # Set outputs for subsequent steps
          echo "backup_success=${BACKUP_SUCCESS}" >> $GITHUB_OUTPUT
          echo "backup_file=${BACKUP_FILE}" >> $GITHUB_OUTPUT
          echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "attempts=${ATTEMPT}" >> $GITHUB_OUTPUT

          if [ "${BACKUP_SUCCESS}" = false ]; then
            echo ""
            echo "=============================================="
            echo "🚨 ALL ${MAX_RETRIES} RETRIES EXHAUSTED — BACKUP FAILED"
            echo "=============================================="
            echo "Please check:"
            echo "  1. SUPABASE_DB_URL secret is correct"
            echo "  2. Supabase project is accessible"
            echo "  3. Database password hasn't changed"
            # Don't exit 1 here — we want the notification step to run
          fi

      # -------------------------------------------------------
      # STEP 5: Upload backup as artifact (if successful)
      # -------------------------------------------------------
      - name: Upload backup artifact
        if: steps.backup.outputs.backup_success == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ steps.backup.outputs.timestamp }}
          path: ${{ steps.backup.outputs.backup_file }}
          retention-days: 90
          compression-level: 9

      # -------------------------------------------------------
      # STEP 6: Log success summary
      # -------------------------------------------------------
      - name: Success summary
        if: steps.backup.outputs.backup_success == 'true'
        run: |
          echo ""
          echo "=============================================="
          echo "🎉 BACKUP COMPLETED SUCCESSFULLY"
          echo "=============================================="
          echo "📅 Timestamp: ${{ steps.backup.outputs.timestamp }}"
          echo "🔄 Attempts needed: ${{ steps.backup.outputs.attempts }} of ${{ env.MAX_RETRIES }}"
          echo "📦 Artifact: supabase-backup-${{ steps.backup.outputs.timestamp }}"
          echo "📆 Retained for: 90 days"
          echo "=============================================="
          echo ""
          echo "To download this backup:"
          echo "  1. Go to the Actions tab in your GitHub repo"
          echo "  2. Click this workflow run"
          echo "  3. Scroll to Artifacts and download"

      # -------------------------------------------------------
      # STEP 7: Create GitHub Issue if ALL retries failed
      # -------------------------------------------------------
      - name: Notify failure via GitHub Issue
        if: steps.backup.outputs.backup_success == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const timestamp = '${{ steps.backup.outputs.timestamp }}';
            const attempts = '${{ steps.backup.outputs.attempts }}';
            const maxRetries = '${{ env.MAX_RETRIES }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Database Backup Failed — ${timestamp}`,
              body: `## Database Backup Failure Report\n\n` +
                    `**Date:** ${timestamp}\n` +
                    `**Attempts:** ${attempts} of ${maxRetries}\n` +
                    `**Status:** ❌ All retries exhausted\n\n` +
                    `### What happened\n` +
                    `The automated Supabase database backup failed after ${maxRetries} attempts.\n\n` +
                    `### What to check\n` +
                    `1. **SUPABASE_DB_URL** secret — Is the connection string still correct?\n` +
                    `2. **Database password** — Has it been changed or rotated?\n` +
                    `3. **Supabase project status** — Is the project paused or suspended?\n` +
                    `4. **Network** — GitHub Actions might have had a temporary outage\n\n` +
                    `### Action needed\n` +
                    `- Check the [workflow run logs](${runUrl}) for detailed error messages\n` +
                    `- Fix the issue and run the backup manually from the Actions tab\n\n` +
                    `---\n` +
                    `*This issue was automatically created by the backup workflow.*`,
              labels: ['backup-failure', 'urgent']
            });
            
            console.log('📬 GitHub Issue created to notify about backup failure');

      # -------------------------------------------------------
      # STEP 8: Final status — fail the workflow if backup failed
      # -------------------------------------------------------
      - name: Final status check
        if: steps.backup.outputs.backup_success == 'false'
        run: |
          echo "❌ Backup failed after all retries. GitHub Issue has been created."
          exit 1